<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Clealco RTK Master</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; }
        #map { width: 100vw; height: 100vh; }
        
        /* Painel do Filtro */
        .filter-panel {
            position: absolute; top: 15px; left: 60px; z-index: 1000;
            background: white; padding: 15px; border: 2px solid #333;
            border-radius: 4px; width: 250px;
        }
        .filter-panel b { text-decoration: underline; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 8px; font-weight: bold; cursor: pointer; }

        /* LEGENDA UNIFICADA - IGUAL À FOTO */
        .legend {
            background: #C0C0C0; /* Cinza claro/médio */
            padding: 10px; border: 1px solid #000;
            line-height: 22px; font-family: Arial, sans-serif;
            color: #000; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .legend u { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        .legend i { 
            width: 22px; height: 22px; float: left; 
            margin-right: 10px; border: 1px solid #000; 
        }

        .label-torre {
            background: transparent; border: none; box-shadow: none;
            color: black; font-weight: bold; font-size: 12px;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
        }
    </style>
</head>
<body>

<div class="filter-panel">
    <b>FAZENDA</b>
    <select id="select-fazenda" onchange="executarFiltro()">
        <option value="">-- SELECIONE --</option>
    </select>
</div>

<div id="map"></div>

<script src="data_talhoes.js"></script>
<script src="data_sinal_1.js"></script>
<script src="data_sinal_2.js"></script>
<script src="data_raio.js"></script>
<script src="data_torres.js"></script>
<script src="fazendas.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Inicialização focada na região
    var map = L.map('map').setView([-21.2, -50.4], 12);
    
    var hibrido = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {attr: 'Google'}).addTo(map);

    // Função de Estilo com as cores que VOCÊ mandou
    function getStyleSinal(feature) {
        var status = feature.properties.label;
        var cor = "#808080"; // Default cinza
        if (status === 'Ótimo') cor = "#00FF00";   // Verde vibrante
        if (status === 'Regular') cor = "#FFFF00"; // Amarelo
        if (status === 'Ruim') cor = "#FF0000";    // Vermelho
        return { color: "black", weight: 0.3, fillColor: cor, fillOpacity: 0.8 };
    }

    // Camadas
    var lyrTalhoes = L.geoJSON(data_talhoes, { style: { color: "black", weight: 1, fillOpacity: 0 } }).addTo(map);
    var lyrSinal = L.featureGroup([
        L.geoJSON(data_sinal_1, { style: getStyleSinal }),
        L.geoJSON(data_sinal_2, { style: getStyleSinal })
    ]).addTo(map);
    var lyrRaio = L.geoJSON(data_raio, { style: { color: "black", weight: 1.5, dashArray: "5, 5", fillOpacity: 0 } }).addTo(map);
    
    var lyrTorres = L.geoJSON(data_torres, {
        pointToLayer: function(f, latlng) {
            var m = L.circleMarker(latlng, { radius: 6, color: 'blue', fillColor: 'white', fillOpacity: 1, weight: 2 });
            m.bindTooltip(f.properties["Nome da to"] || "S/N", { permanent: true, direction: 'top', className: 'label-torre' });
            return m;
        }
    }).addTo(map);

    // FILTRO DE FAZENDA (Reescrito do zero)
    var combo = document.getElementById("select-fazenda");
    lista_fazendas.forEach(f => {
        let opt = document.createElement("option");
        opt.value = f; opt.textContent = f;
        combo.appendChild(opt);
    });

    function executarFiltro() {
        var faz = combo.value;
        if (!faz) return;

        var bounds = L.latLngBounds([]);
        var achei = false;

        // Vasculha o dado bruto para não ter erro de camada não carregada
        data_talhoes.features.forEach(function(f) {
            if (f.properties.FAZENDA === faz) {
                var layer = L.geoJSON(f);
                bounds.extend(layer.getBounds());
                achei = true;
            }
        });

        if (achei) {
            map.fitBounds(bounds, { padding: [50, 50] });
        } else {
            alert("Fazenda não localizada nos dados.");
        }
    }

    // LEGENDA UNIFICADA (IGUAL À IMAGEM)
    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
        var div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<u><b>SINAL RTK</b></u>' +
                        '<i style="background:#00FF00"></i> Ótimo<br>' +
                        '<i style="background:#FFFF00"></i> Regular<br>' +
                        '<i style="background:#FF0000"></i> Ruim';
        return div;
    };
    legend.addTo(map);

    // Controle de Camadas
    L.control.layers(null, {
        "Talhões (Borda)": lyrTalhoes,
        "Sinal RTK": lyrSinal,
        "Raio Cobertura": lyrRaio,
        "Torres": lyrTorres
    }, {collapsed: false}).addTo(map);

</script>
</body>
</html>
